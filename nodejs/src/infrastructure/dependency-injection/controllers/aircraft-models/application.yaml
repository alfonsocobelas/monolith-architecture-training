        '@AircraftModels.Application.Create.RegisterAircraftModelUseCase'
      ]
    EntryPoints.Controllers.AircraftModelGetByIdController:
      class: ../../../entrypoints/controllers/aircraft-models/aircraft-model-get-by-id.controller
