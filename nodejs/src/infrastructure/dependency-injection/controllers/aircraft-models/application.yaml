        '@AircraftModels.Application.Find.ListAircraftModelCatalogueUseCase'
      ]
    EntryPoints.Controllers.AircraftModelDeleteController:
      class: ../../../entrypoints/controllers/aircraft-models/aircraft-model-delete.controller
      arguments: [
        '@AircraftModels.Application.Delete.RemoveAircraftModelUseCase'
      ]
