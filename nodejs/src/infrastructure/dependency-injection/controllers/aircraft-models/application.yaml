        '@AircraftModels.Application.Find.GetAircraftModelUseCase'
      ]
    EntryPoints.Controllers.AircraftModelGetCatalogueController:
      class: ../../../entrypoints/controllers/aircraft-models/aircraft-model-get-catalogue.controller
